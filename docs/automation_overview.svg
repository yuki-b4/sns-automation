<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1080" font-family="'Hiragino Sans','Yu Gothic','Noto Sans CJK JP','Meiryo',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 z" fill="#D97757"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1080" fill="#FAFAF7"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" font-size="32" font-weight="700" fill="#1F2937">SNS運用 自動化のしくみ</text>
  <text x="700" y="82" text-anchor="middle" font-size="15" fill="#4B5563">毎日きまった時刻に、AIが投稿文を考えて、SNSへ自動投稿し、結果を集めて改善案まで出す ── そこまでを全自動で回している</text>

  <!-- ========== TOP HALF: 投稿の流れ ========== -->
  <text x="60" y="125" font-size="20" font-weight="700" fill="#1F2937">▼ 投稿の流れ（生成 → 配信）</text>

  <!-- 1. Schedule -->
  <rect x="60" y="145" width="220" height="190" rx="14" fill="#E3EFFA" stroke="#3478C6" stroke-width="2"/>
  <text x="170" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#1F4D7A">① 毎日のスケジュール</text>
  <text x="170" y="195" text-anchor="middle" font-size="11" fill="#4B5563">時計に合わせて勝手に起動</text>
  <text x="76" y="220" font-size="11.5" fill="#1F2937">08:05 / 09:55 / 11:45</text>
  <text x="76" y="237" font-size="11.5" fill="#1F2937">15:15 / 18:05 / 21:02</text>
  <text x="76" y="252" font-size="10.5" fill="#4B5563">　→ Threads 投稿（5パターン）</text>
  <text x="76" y="278" font-size="11.5" fill="#1F2937">07:00 → note テーマ提案</text>
  <text x="76" y="295" font-size="11.5" fill="#1F2937">20:00 → note 誘導（3日に1回）</text>
  <text x="76" y="315" font-size="10.5" fill="#4B5563">06:00 → メトリクス収集</text>
  <text x="76" y="328" font-size="10.5" fill="#4B5563">週2回 → 改善レポート / 競合分析</text>

  <line x1="280" y1="240" x2="318" y2="240" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. GitHub Actions -->
  <rect x="320" y="145" width="200" height="190" rx="14" fill="#F0F1F4" stroke="#24292F" stroke-width="2"/>
  <text x="420" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#24292F">② GitHub Actions</text>
  <text x="420" y="205" text-anchor="middle" font-size="12" fill="#1F2937">時刻が来たら自動で動く</text>
  <text x="420" y="223" text-anchor="middle" font-size="12" fill="#1F2937">"無人の作業員"</text>
  <text x="420" y="258" text-anchor="middle" font-size="11" fill="#4B5563">クラウド上のサーバーが</text>
  <text x="420" y="275" text-anchor="middle" font-size="11" fill="#4B5563">Python スクリプトを実行</text>
  <text x="420" y="307" text-anchor="middle" font-size="10.5" fill="#6B7280">自前のPCは不要</text>
  <text x="420" y="322" text-anchor="middle" font-size="10.5" fill="#6B7280">電源を切っていてもOK</text>

  <line x1="520" y1="240" x2="558" y2="240" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. Preflight -->
  <rect x="560" y="145" width="200" height="190" rx="14" fill="#FFE3E0" stroke="#C62828" stroke-width="2"/>
  <text x="660" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#C62828">③ 事前チェック</text>
  <text x="660" y="192" text-anchor="middle" font-size="11" fill="#C62828">（Preflight）</text>
  <text x="660" y="218" text-anchor="middle" font-size="12" fill="#1F2937">配信先・保存先が</text>
  <text x="660" y="235" text-anchor="middle" font-size="12" fill="#1F2937">無事に動くか確認</text>
  <text x="660" y="263" text-anchor="middle" font-size="10.5" fill="#4B5563">Threads / Slack / Sheets</text>
  <text x="660" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#C62828">失敗なら即停止</text>
  <text x="660" y="311" text-anchor="middle" font-size="10.5" fill="#C62828">AI利用料の無駄を防ぐ</text>

  <line x1="760" y1="240" x2="798" y2="240" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Claude AI -->
  <rect x="800" y="145" width="240" height="190" rx="14" fill="#FCE9DC" stroke="#D97757" stroke-width="2.5"/>
  <text x="920" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#A14B2D">④ Claude（AI）</text>
  <text x="920" y="195" text-anchor="middle" font-size="11" fill="#A14B2D">文章を考える "脳"</text>
  <text x="820" y="225" font-size="11.5" fill="#1F2937">・投稿本文 ＋ 補足リプライ</text>
  <text x="820" y="245" font-size="11.5" fill="#1F2937">・note のテーマ提案（3案）</text>
  <text x="820" y="265" font-size="11.5" fill="#1F2937">・改善レポート／競合分析</text>
  <text x="820" y="285" font-size="11.5" fill="#1F2937">・noteへの誘導フック文</text>
  <text x="920" y="318" text-anchor="middle" font-size="10.5" fill="#6B7280">Anthropic の生成AI を呼び出す</text>

  <line x1="1040" y1="240" x2="1078" y2="240" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. Output (Threads / note) -->
  <rect x="1080" y="145" width="260" height="190" rx="14" fill="#F5F5F5" stroke="#111827" stroke-width="2"/>
  <text x="1210" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">⑤ 自動投稿</text>

  <rect x="1095" y="190" width="230" height="60" rx="8" fill="#FFFFFF" stroke="#111827" stroke-width="1"/>
  <text x="1210" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Threads</text>
  <text x="1210" y="227" text-anchor="middle" font-size="10.5" fill="#1F2937">本文＋補足リプライで3投稿構成</text>
  <text x="1210" y="242" text-anchor="middle" font-size="10.5" fill="#1F2937">（投稿は完全自動）</text>

  <rect x="1095" y="260" width="230" height="65" rx="8" fill="#E6F4EA" stroke="#2EA44F" stroke-width="1"/>
  <text x="1210" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#1F7A36">note</text>
  <text x="1210" y="297" text-anchor="middle" font-size="10.5" fill="#1F2937">テーマ3案だけ自動生成</text>
  <text x="1210" y="312" text-anchor="middle" font-size="10.5" fill="#1F2937">（本文は人が書く運用）</text>

  <!-- Strategy config under Claude -->
  <rect x="800" y="380" width="240" height="120" rx="14" fill="#FFF4E5" stroke="#E5934D" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="920" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#A14B2D">📘 戦略・ペルソナ</text>
  <text x="920" y="427" text-anchor="middle" font-size="11" fill="#4B5563">config/strategy.json（1ファイル）</text>
  <text x="820" y="450" font-size="11" fill="#1F2937">・誰に / 何を / どう届けるか</text>
  <text x="820" y="467" font-size="11" fill="#1F2937">・商品体系・ファネル設計</text>
  <text x="820" y="484" font-size="11" fill="#1F2937">・投稿タイプ5種の出し分け</text>

  <line x1="920" y1="380" x2="920" y2="340" stroke="#E5934D" stroke-width="2" marker-end="url(#arrowOrange)" stroke-dasharray="6,3"/>
  <text x="1050" y="365" font-size="11" fill="#A14B2D" font-weight="600">AIに毎回読ませる</text>

  <!-- ====== Divider ====== -->
  <line x1="60" y1="540" x2="1340" y2="540" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ========== BOTTOM HALF: 結果から改善へ ========== -->
  <text x="60" y="575" font-size="20" font-weight="700" fill="#1F2937">▼ 結果を集めて、改善につなげる（測定 → 分析 → 通知）</text>

  <!-- 6. Post results from SNS (right) -->
  <rect x="1080" y="605" width="260" height="150" rx="14" fill="#F5F5F5" stroke="#111827" stroke-width="1.5"/>
  <text x="1210" y="632" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">⑥ 投稿の反応</text>
  <text x="1210" y="660" text-anchor="middle" font-size="12" fill="#1F2937">いいね・閲覧・返信数</text>
  <text x="1210" y="678" text-anchor="middle" font-size="12" fill="#1F2937">補足リプライの数値も込み</text>
  <text x="1210" y="710" text-anchor="middle" font-size="10.5" fill="#6B7280">Threads API から</text>
  <text x="1210" y="725" text-anchor="middle" font-size="10.5" fill="#6B7280">毎朝 06:00 にまとめて取得</text>

  <line x1="1080" y1="680" x2="1042" y2="680" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7. Metrics collection -->
  <rect x="800" y="605" width="240" height="150" rx="14" fill="#E0F2E9" stroke="#0F9D58" stroke-width="2"/>
  <text x="920" y="632" text-anchor="middle" font-size="15" font-weight="700" fill="#0F7A45">⑦ メトリクス収集</text>
  <text x="920" y="660" text-anchor="middle" font-size="11.5" fill="#1F2937">毎朝 06:00 自動実行</text>
  <text x="920" y="690" text-anchor="middle" font-size="11" fill="#1F2937">直近30日の投稿に対し</text>
  <text x="920" y="707" text-anchor="middle" font-size="11" fill="#1F2937">最新の数値を取り直して</text>
  <text x="920" y="724" text-anchor="middle" font-size="11" fill="#1F2937">Sheetsへ上書き保存</text>

  <line x1="800" y1="680" x2="762" y2="680" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 8. Google Sheets (central DB) -->
  <rect x="460" y="585" width="300" height="190" rx="14" fill="#E0F2E9" stroke="#0F9D58" stroke-width="3"/>
  <text x="610" y="612" text-anchor="middle" font-size="16" font-weight="700" fill="#0F7A45">⑧ Google Sheets</text>
  <text x="610" y="630" text-anchor="middle" font-size="11" font-weight="600" fill="#0F7A45">システム唯一のデータ置き場</text>
  <text x="478" y="657" font-size="11" fill="#1F2937">• 投稿DB（履歴・本文）</text>
  <text x="478" y="675" font-size="11" fill="#1F2937">• メトリクスDB（数値の最新値）</text>
  <text x="478" y="693" font-size="11" fill="#1F2937">• 競合投稿DB（手動入力）</text>
  <text x="478" y="711" font-size="11" fill="#1F2937">• note投稿DB（テーマ提案履歴）</text>
  <text x="478" y="729" font-size="11" fill="#1F2937">• 関心テーマDB（ネタ資料）</text>
  <text x="610" y="757" text-anchor="middle" font-size="10" fill="#6B7280">サーバー型DBを持たず、誰でも開けるスプレッドシートで運用</text>

  <line x1="460" y1="680" x2="422" y2="680" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 9. Weekly report -->
  <rect x="220" y="605" width="200" height="150" rx="14" fill="#FCE9DC" stroke="#D97757" stroke-width="2"/>
  <text x="320" y="632" text-anchor="middle" font-size="15" font-weight="700" fill="#A14B2D">⑨ 改善レポート</text>
  <text x="320" y="650" text-anchor="middle" font-size="11" fill="#A14B2D">／競合分析</text>
  <text x="320" y="678" text-anchor="middle" font-size="11" fill="#1F2937">Claudeが過去データを読み</text>
  <text x="320" y="694" text-anchor="middle" font-size="11" fill="#1F2937">「次の打ち手」を提案</text>
  <text x="320" y="724" text-anchor="middle" font-size="10.5" fill="#6B7280">週次：水・土 09:00</text>
  <text x="320" y="740" text-anchor="middle" font-size="10.5" fill="#6B7280">競合：火・金 08:00</text>

  <line x1="220" y1="680" x2="182" y2="680" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 10. Slack -->
  <rect x="60" y="605" width="120" height="150" rx="14" fill="#F0DEF3" stroke="#4A154B" stroke-width="2"/>
  <text x="120" y="632" text-anchor="middle" font-size="15" font-weight="700" fill="#4A154B">⑩ Slack</text>
  <text x="120" y="652" text-anchor="middle" font-size="11" fill="#4A154B">運用者の手元</text>
  <text x="70" y="678" font-size="10.5" fill="#1F2937">・投稿完了通知</text>
  <text x="70" y="694" font-size="10.5" fill="#1F2937">・改善レポート</text>
  <text x="70" y="710" font-size="10.5" fill="#1F2937">・類似投稿の警告</text>
  <text x="70" y="726" font-size="10.5" fill="#1F2937">・競合分析の結果</text>
  <text x="70" y="742" font-size="10.5" fill="#1F2937">・DB更新リマインド</text>

  <!-- Curved arrow: post recording to Sheets -->
  <path d="M 1210 335 C 1210 460, 900 510, 700 585" fill="none" stroke="#6B7280" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="985" y="455" font-size="11" fill="#6B7280" font-style="italic">投稿の本文・IDをSheetsに記録</text>

  <!-- Curved feedback loop: improvement report → strategy update (human-in-the-loop) -->
  <path d="M 320 605 C 320 525, 500 510, 800 460" fill="none" stroke="#D97757" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="430" y="540" font-size="11.5" fill="#A14B2D" font-weight="700">運用者がレポートを読み、戦略・プロンプトを調整</text>

  <!-- ========== Footer: key points ========== -->
  <rect x="60" y="810" width="1280" height="245" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="80" y="840" font-size="16" font-weight="700" fill="#1F2937">▼ 非エンジニア向けの要点</text>

  <g transform="translate(80, 860)">
    <circle cx="8" cy="10" r="6" fill="#3478C6"/>
    <text x="24" y="14" font-size="12.5" fill="#1F2937"><tspan font-weight="700">自分のパソコンは不要：</tspan>GitHubのクラウドが「決まった時刻に勝手に動く作業員」を提供。電源を切っていても投稿される。</text>
  </g>
  <g transform="translate(80, 888)">
    <circle cx="8" cy="10" r="6" fill="#D97757"/>
    <text x="24" y="14" font-size="12.5" fill="#1F2937"><tspan font-weight="700">AIへの指示は1ファイルに集約：</tspan>「誰に・何を・どんな投稿で届けるか」は strategy.json に書いてある。ここを直すと出力が変わる。</text>
  </g>
  <g transform="translate(80, 916)">
    <circle cx="8" cy="10" r="6" fill="#C62828"/>
    <text x="24" y="14" font-size="12.5" fill="#1F2937"><tspan font-weight="700">AI を呼ぶ前に必ず安全チェック：</tspan>配信先や保存先が落ちていれば「生成すらせず」止まる。AI 利用料が無駄になるのを未然に防ぐしくみ。</text>
  </g>
  <g transform="translate(80, 944)">
    <circle cx="8" cy="10" r="6" fill="#0F9D58"/>
    <text x="24" y="14" font-size="12.5" fill="#1F2937"><tspan font-weight="700">データ置き場は Google スプレッドシート：</tspan>履歴も数値も1つのシートに集まる。非エンジニアでも直接開いて確認・修正できる。</text>
  </g>
  <g transform="translate(80, 972)">
    <circle cx="8" cy="10" r="6" fill="#4A154B"/>
    <text x="24" y="14" font-size="12.5" fill="#1F2937"><tspan font-weight="700">運用者は Slack だけ見ていればよい：</tspan>投稿完了・改善レポート・類似投稿の警告まで全部 Slack に流れる。重要なものだけメンションが付く。</text>
  </g>
  <g transform="translate(80, 1000)">
    <circle cx="8" cy="10" r="6" fill="#E5934D"/>
    <text x="24" y="14" font-size="12.5" fill="#1F2937"><tspan font-weight="700">"完全自動" ではなく "9割自動"：</tspan>note本文の執筆、競合投稿の追加、戦略ファイルの更新だけが人の仕事。それ以外はすべて自動で回り続ける。</text>
  </g>
  <g transform="translate(80, 1028)">
    <circle cx="8" cy="10" r="6" fill="#6B7280"/>
    <text x="24" y="14" font-size="12.5" fill="#1F2937"><tspan font-weight="700">時間外コストはほぼゼロ：</tspan>GitHub Actions（無料枠内）＋ Claude API（従量・呼び出した分だけ）＋ Google Sheets（無料）で構成。サーバー固定費は不要。</text>
  </g>
</svg>
