name: GW Note Promo B 22:00 JST (2026-05-01〜2026-05-06)

# GW期間限定の有料note拡散用Threads投稿（slot 1 / 22:00 JST）。
# - スクリプト側で配信期間（config/gw_note_promo_prompts.json の campaign_window）を
#   ガードしているため、cron は毎日起動しても期間外は静かにスキップする。
# - GW終了後（2026-05-07以降）はこのワークフローを無効化または削除して構わない。
on:
  schedule:
    - cron: '0 13 * * *'  # UTC 13:00 = JST 22:00
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/gw_note_promo.py
        env:
          GW_SLOT: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
