name: Note Promo Threads (Daily 20:00 JST)

# 当日生成した無料note記事（output/notes/YYYY-MM-DD_free.md）を読みたくさせる
# 3投稿構成スレッド（フック本文 → 補足リプライ1 → URL単独リプライ）を毎日20:00 JSTに配信する。
# - 当日のnote原稿が無い、または note投稿DB の url 列が空ならスクリプト側でスキップしSlack通知。
on:
  schedule:
    - cron: '0 11 * * *'  # UTC 11:00 = JST 20:00
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/post_note_promo.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
