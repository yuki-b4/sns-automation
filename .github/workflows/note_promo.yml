name: Note Promo Threads (Every 3 days 20:00 JST)

# 当日生成した無料note記事（output/notes/YYYY-MM-DD_free.md）を読みたくさせる
# 3投稿構成スレッド（フック本文 → 補足リプライ1 → URL単独リプライ）を3日に1回 20:00 JSTに配信する。
# - cronは毎日起動するが、スクリプト側で date.toordinal() % 3 == 0 の日のみ実投稿する
#   （月末/年末を跨いでも常に3日間隔を維持するため）。
# - 当日のnote原稿が無い、または note投稿DB の url 列が空ならスクリプト側でスキップしSlack通知。
on:
  # 一時停止中（2026-06-16〜）: note生成停止に伴い当日note原稿が出ないため、本配信も停止。
  # 再開する場合は下の schedule 節のコメントを外す。手動実行(workflow_dispatch)は引き続き可能。
  # schedule:
  #   - cron: '0 11 * * *'  # UTC 11:00 = JST 20:00
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/post_note_promo.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
